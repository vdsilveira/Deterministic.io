  <circle cx="600" cy="190" r="35" fill="none" stroke="#FF9800" stroke-width="3" stroke-dasharray="8,8"/>
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="12" fill="#FF9800" text-anchor="middle">INPUTS</text>

  <path d="M 280 135 Q 400 135 400 190 L 565 190" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  <path d="M 280 175 Q 400 175 400 190 L 565 190" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  <path d="M 280 215 Q 400 215 400 190 L 565 190" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  <path d="M 280 255 Q 400 255 400 190 L 565 190" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6"/>

  <path d="M 635 190 L 720 190" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

  <path d="M 740 175 L 740 205 M 725 190 L 755 190" stroke="#FF9800" stroke-width="3" stroke-linecap="round"/>
  <text x="740" y="165" font-family="Arial, sans-serif" font-size="12" fill="#FF9800" text-anchor="middle" opacity="0.8">SEED</text>

  <path d="M 770 190 L 850 190" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

